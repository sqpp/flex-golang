name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, 386, arm64]
        exclude:
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: 386
    
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }} 
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22.x'
        cache: false

    - name: Cross-Compile
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        mkdir -p dist
        EXT=""
        if [ "${{ matrix.goos }}" = "windows" ]; then
          EXT=".exe"
        fi
        
        # Build flex-decode
        go build -v -o "dist/flex-decode-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" ./cmd/flex-decode

    - name: Test
      if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
      env:
        CGO_ENABLED: 0
      run: go test -v ./...
      
    - uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
        path: dist/*
